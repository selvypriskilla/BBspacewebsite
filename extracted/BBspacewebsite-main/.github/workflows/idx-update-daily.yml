name: 📊 Update IDX Data Daily

on:
  # Run every weekday at 17:10 WIB (10:10 UTC)
  # Stock exchange closes at 16:00, we wait 1 hour for data to settle
  schedule:
    - cron: "10 10 * * 1-5" # Monday-Friday, 17:10 WIB

  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:
    inputs:
      full_history:
        description: "Fetch full 5-year history? (slow, caution)"
        required: false
        default: "false"
        type: boolean
      compute_ratios:
        description: "Compute financial ratios?"
        required: false
        default: "true"
        type: boolean

jobs:
  update-idx-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. Setup Python 3.11
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/etl/requirements.txt"

      # 3. Install Python dependencies
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/etl/requirements.txt

      # 4. Run ETL Pipeline
      - name: Run IDX ETL Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scripts/etl

          # Build command flags
          FLAGS=""
          if [ "${{ github.event.inputs.full_history }}" == "true" ]; then
            echo "🔄 Full history mode enabled"
            FLAGS="$FLAGS --full"
          fi
          if [ "${{ github.event.inputs.compute_ratios }}" == "false" ]; then
            echo "⏭️  Skipping ratio computation"
            FLAGS="$FLAGS --no-ratios"
          fi

          echo "🚀 Starting pipeline with flags: $FLAGS"
          python idx_pipeline.py $FLAGS

          if [ $? -eq 0 ]; then
            echo "✅ Pipeline succeeded"
          else
            echo "❌ Pipeline failed"
            exit 1
          fi

      # 5. Compute Technical Indicators (if needed)
      - name: Compute Technical Indicators
        if: github.event.inputs.compute_ratios != 'false'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          cd scripts/etl
          python idx_compute_indicators.py 100  # Process top 100 stocks

      # 6. Notify on failure (optional - could add Slack webhook)
      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ IDX pipeline failed at $(date)"
          echo "Check GitHub Actions for details"
          # Could add Slack webhook here:
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"IDX pipeline failed"}' \
          #   ${{ secrets.SLACK_WEBHOOK }}

      # 7. Notify on success
      - name: Notify on success
        if: success()
        run: |
          echo "✅ IDX pipeline completed successfully"
          echo "Data sync: $(date '+%Y-%m-%d %H:%M:%S WIB')"
